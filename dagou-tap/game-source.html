<!DOCTYPE html>
<html lang="zh-CN">
<head><script>if(window.self===window.top){window.location.replace("https://www.bilibili.com/toy/Dagou-Tap/12420391163904-v6/index.html");}</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#fff2dc" />
<title>大狗Tap</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐶</text></svg>" />
<script src="vendor/toy-sdk.js"></script>
<style>
  /* 全页面限定调色板：米白底 + 主色黄 + 次色灰（极少点缀色） */
  :root {
    --cream: #fff2dc;   /* 背景 · 米白 */
    --amber: #ffb400;   /* 主色 · 黄 */
    --gray:  #87837e;   /* 次要 · 灰 */
    --coral: #ff5a5f;   /* 点缀（少量） */
    --teal:  #16c2a3;   /* 点缀（少量） */
    --blue:  #3e7bfa;   /* 点缀（少量） */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--cream);
    color: var(--gray);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  /* 纯色背景（固定米白，canvas 未启动时的兜底色） */
  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    isolation: isolate;
    background: var(--cream);
    --scene-unit: 200px;
  }

  /* 全屏特效画布（仿 Mikutap：特效铺满全屏、层层叠加） */
  #fx {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  /* 常驻作者署名：始终位于页面最前层。
     两行严格等宽；Created by 整体跟拍，MarkCup 每拍依次放大一个字母。 */
  #author-link {
    position: absolute;
    right: max(18px, env(safe-area-inset-right));
    bottom: max(16px, env(safe-area-inset-bottom));
    z-index: 30;
    padding: 10px 12px 11px;
    display: block;
    text-decoration: none;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform .22s ease;
  }
  .author-copy {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    width: 124px;
    gap: 5px;
  }
  .author-label,
  .author-name {
    width: 100%;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .author-label {
    color: rgba(255, 180, 0, .78);
    font: 600 9px/1 "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    letter-spacing: 0;
    text-transform: uppercase;
    white-space: nowrap;
    transform-origin: 50% 70%;
    transform:
      translateY(var(--author-lift, 0px))
      scale(var(--author-rhythm-scale, 1));
    transition: color .22s ease;
  }
  .author-name {
    width: calc(100% + 6px);
    margin-left: -3px;
    color: var(--amber);
    font: 700 20px/1.15 "Noto Serif SC", "Songti SC", SimSun, serif;
    letter-spacing: 0;
    white-space: nowrap;
    transition: color .22s ease;
  }
  /* JS 将两行拆成等距字符；仅 MarkCup 字母逐拍放大 */
  .author-letter {
    display: inline-block;
    transform-origin: 50% 72%;
    will-change: transform;
  }
  @media (hover: hover) {
    #author-link:hover { transform: translateY(-2px); }
    #author-link:hover .author-label,
    #author-link:hover .author-name { color: #d88f00; }
  }
  #author-link:focus-visible {
    outline: 2px solid rgba(62, 123, 250, .35);
    outline-offset: 2px;
  }

  /* 分区按钮闪光层：点击/滑过时分区短暂显示半透明白色再淡出 */
  #zoneflash {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }
  .zone-flash {
    position: absolute;
    background: #fff;
    border-radius: 2vmin;
    opacity: 0;
    animation: zoneFade .45s ease-out forwards;
  }
  @keyframes zoneFade {
    0%   { opacity: .45; }
    100% { opacity: 0; }
  }

  /* 大狗 */
  #dog {
    position: absolute;
    inset: 0;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    will-change: transform;
    transform-origin: 50% 62%;   /* 节拍压缩围绕狗身体中下部进行 */
  }
  #dog-inner {
    position: relative;
    width: var(--scene-unit);
    will-change: transform;   /* 叫弹簧跳由 JS 逐帧驱动（无 CSS transition，保证果断跟手） */
  }
  /* 长按果冻层：transform / 变红滤镜全部由 JS 逐帧驱动（Q弹 + 高频抖动） */
  #dog-jelly {
    position: relative;
    will-change: transform, filter;
  }
  #dog-inner img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 18px 40px rgba(135, 131, 126, .4));
  }
  #dog-inner.custom-image img {
    max-height: min(62vh, 620px);
    object-fit: contain;
  }
  /* 张嘴图叠在闭嘴图之上：下层始终不透明，只切换上层透明度，
     避免交叉淡化时两张图都半透明导致整体变透明 */
  #dog-open {
    position: absolute;
    left: 0; top: 0;
    opacity: 0;
    transition: opacity .08s linear;
  }
  #dog-inner.bark-image #dog-open { opacity: 1; }

  /* 图片选择面板 */
  #image-picker {
    position: absolute;
    inset: 0;
    z-index: 40;
    display: none;
    align-items: center;
    justify-content: center;
    padding: max(20px, env(safe-area-inset-top)) 20px
      max(20px, env(safe-area-inset-bottom));
    background: rgba(135, 131, 126, .28);
    pointer-events: auto;
  }
  #image-picker.is-open { display: flex; }
  .image-picker-card {
    position: relative;
    width: min(440px, 100%);
    padding: 24px;
    color: var(--gray);
    background: rgba(255, 242, 220, .98);
    border: 2px solid rgba(255, 180, 0, .72);
    border-radius: 18px;
    box-shadow: 0 18px 50px rgba(135, 131, 126, .3);
    touch-action: manipulation;
  }
  .image-picker-title {
    margin-bottom: 6px;
    color: var(--amber);
    font-size: 22px;
    font-weight: 900;
  }
  .image-picker-hint {
    margin-bottom: 18px;
    font-size: 13px;
    line-height: 1.6;
  }
  .image-picker-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 34px;
    height: 34px;
    border: 0;
    border-radius: 50%;
    color: var(--gray);
    background: rgba(135, 131, 126, .12);
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
  }
  .image-picker-options {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  .image-picker-option {
    min-height: 150px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 9px;
    border: 2px solid rgba(135, 131, 126, .22);
    border-radius: 12px;
    color: var(--gray);
    background: rgba(255, 255, 255, .46);
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.2;
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease, transform .2s ease;
  }
  .image-picker-option:hover,
  .image-picker-option:focus-visible {
    border-color: var(--amber);
    background: rgba(255, 180, 0, .12);
    outline: none;
  }
  .image-picker-option:active { transform: scale(.97); }
  .image-picker-option.is-selected { border-color: var(--amber); }
  .image-picker-option img {
    width: 92px;
    height: 92px;
    object-fit: contain;
    filter: drop-shadow(0 6px 10px rgba(135, 131, 126, .22));
  }
  .image-upload-icon {
    width: 92px;
    height: 92px;
    display: grid;
    place-items: center;
    border: 2px dashed rgba(255, 180, 0, .75);
    border-radius: 12px;
    color: var(--amber);
    font-size: 38px;
  }
  #image-picker-status {
    min-height: 20px;
    margin-top: 14px;
    color: var(--gray);
    font-size: 12px;
    line-height: 1.5;
  }
  #clear-custom-image {
    display: none;
    margin-top: 4px;
    padding: 0;
    border: 0;
    color: var(--coral);
    background: transparent;
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.5;
    cursor: pointer;
  }
  #clear-custom-image.is-visible { display: inline-block; }
  @media (max-width: 430px) {
    .image-picker-card { padding: 20px; }
    .image-picker-option { min-height: 130px; }
    .image-picker-option img,
    .image-upload-icon { width: 76px; height: 76px; }
  }

  /* 顶部控制：互动时隐藏，闲置 2 秒后由 JS 淡入 */
  #top-controls {
    position: absolute;
    top: max(14px, env(safe-area-inset-top));
    left: max(14px, env(safe-area-inset-left));
    right: max(14px, env(safe-area-inset-right));
    z-index: 20;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    opacity: 0;
    transform: translateY(-8px);
    pointer-events: none;
    /* 投影放在容器上：按钮本体用了 clip-path 切角，box-shadow 会被一起裁掉，
       容器的 drop-shadow 才能贴合八边形轮廓 */
    filter: drop-shadow(0 6px 14px rgba(135, 131, 126, .22));
    transition: opacity .5s ease, transform .5s cubic-bezier(.2, .8, .2, 1);
  }
  #top-controls.is-visible {
    opacity: 1;
    transform: translateY(0);
  }
  #top-controls.is-revealing-fast {
    transition-duration: .2s;
  }
  .control-group {
    display: flex;
    gap: 8px;
  }
  /* 几何化切角按钮：八边形轮廓呼应全屏几何特效（hexagon / diamond 粒子）。
     按钮本体背景充当“描边色”，::before 用缩小一号的同款切角多边形铺底色，
     描边因此能严格贴合切角（普通 border 做不到），颜色用变量一键切换 */
  .control-button {
    --btn-edge: rgba(135, 131, 126, .72);   /* 描边色 */
    --btn-fill: rgba(255, 242, 220, .92);   /* 底色 */
    position: relative;
    min-width: 68px;
    min-height: 44px;
    padding: 8px 12px;
    border: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--gray);
    background: var(--btn-edge);
    clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px),
                       calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    font: 700 13px/1 "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    cursor: pointer;
    pointer-events: auto;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transform: scale(var(--rhythm-scale, 1));
    transition: color .2s ease, background .2s ease;
  }
  .control-button::before {
    content: "";
    position: absolute;
    inset: 2px;
    z-index: -1;
    background: var(--btn-fill);
    clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px),
                       calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px), 0 8px);
    transition: background .2s ease;
  }
  /* 律动缩放由 JS 使用 Web Audio 时钟逐帧写入，避免切换静音时相位重置 */
  .control-button:active { transform: scale(.94); }
  .control-button:focus-visible {
    outline: 3px solid rgba(62, 123, 250, .38);
    outline-offset: 2px;
  }
  /* 悬停描边变琥珀色（仅桌面端）；.is-muted 规则在更后面，静音态优先 */
  @media (hover: hover) {
    .control-button:hover { --btn-edge: rgba(255, 180, 0, .85); }
    #video-button:hover { --btn-fill: rgba(255, 180, 0, .18); }
  }
  .control-button svg {
    width: 20px;
    height: 20px;
    overflow: visible;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .control-button .mute-slash {
    opacity: 0;
    stroke: var(--coral);
    stroke-width: 2.6;
    transition: opacity .2s ease;
  }
  .control-button.is-muted {
    --btn-edge: rgba(255, 90, 95, .68);
    --btn-fill: rgba(255, 255, 255, .94);
    color: var(--coral);
  }
  .control-button.is-muted .mute-slash { opacity: 1; }
  #video-button {
    --btn-edge: rgba(255, 180, 0, .88);
    color: #765f41;
  }
  @media (max-width: 430px) {
    #top-controls {
      top: max(10px, env(safe-area-inset-top));
      left: max(10px, env(safe-area-inset-left));
      right: max(10px, env(safe-area-inset-right));
    }
    .control-button {
      min-width: 44px;
      padding-inline: 10px;
    }
    .control-button span { display: none; }
    #author-link {
      right: max(10px, env(safe-area-inset-right));
      bottom: max(10px, env(safe-area-inset-bottom));
      min-width: 0;
      max-width: calc(100% - 20px);
      padding: 8px 9px 7px 12px;
    }
    .author-copy { width: 106px; }
    .author-name {
      width: calc(100% + 4px);
      margin-left: -2px;
      font-size: 15px;
    }
  }

  /* 开始遮罩（首次点击解锁音频） */
  #overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 2.2vmin;
    align-items: center;
    justify-content: center;
    background: rgba(255, 242, 220, .9);
    transition: opacity .5s ease;
    cursor: pointer;
  }
  #overlay.hide { opacity: 0; pointer-events: none; }
  #overlay .title {
    font-size: clamp(34px, 8vmin, 72px);
    font-weight: 900;
    letter-spacing: .18em;
    color: var(--amber);
  }
  #overlay .title em { font-style: normal; color: var(--gray); }
  #overlay .sub {
    font-size: clamp(13px, 2.4vmin, 18px);
    letter-spacing: .5em;
    color: var(--gray);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .35; } }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="fx"></canvas>
    <a id="author-link" href="https://space.bilibili.com/357762853" aria-label="打开作者哔哩哔哩主页">
      <span class="author-copy" aria-hidden="true">
        <span class="author-label">Created by</span>
        <span class="author-name">MarkCup</span>
      </span>
    </a>
    <div id="zoneflash"></div>

    <div id="dog">
      <div id="dog-inner">
        <div id="dog-jelly">
          <img id="dog-close" src="Image/dagou_close_mouth.png" alt="大狗" draggable="false" />
          <img id="dog-open" src="Image/dagou_open_mouth.png" alt="" draggable="false" />
        </div>
      </div>
    </div>

    <div id="top-controls" class="is-visible" aria-label="声音与导航控制">
      <div id="audio-controls" class="control-group">
        <button id="music-toggle" class="control-button" type="button" aria-label="关闭音乐" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 18V5l10-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="16" cy="16" r="3" />
            <path class="mute-slash" d="M4 3l16 18" />
          </svg>
          <span>音乐</span>
        </button>
        <button id="sfx-toggle" class="control-button" type="button" aria-label="关闭音效" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 9v6h4l5 4V5L9 9H5z" />
            <path d="M17 9.5a4 4 0 010 5" />
            <path class="mute-slash" d="M4 3l16 18" />
          </svg>
          <span>音效</span>
        </button>
        <button id="image-button" class="control-button" type="button" aria-label="选择图片" aria-haspopup="dialog">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="4" width="18" height="16" rx="2" />
            <circle cx="8.5" cy="9" r="1.5" />
            <path d="M4 17l5-5 3.5 3.5 2.5-2.5 5 5" />
          </svg>
          <span>图片</span>
        </button>
      </div>
      <button id="video-button" class="control-button" type="button" aria-label="打开哔哩哔哩视频 BV1kNKU6REBg">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="5" width="18" height="14" rx="3" />
          <path d="M10 9l5 3-5 3z" />
        </svg>
        <span>视频</span>
      </button>
    </div>

    <div id="image-picker" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="image-picker-title">
      <div class="image-picker-card">
        <button id="image-picker-close" class="image-picker-close" type="button" aria-label="关闭图片选择">×</button>
        <div id="image-picker-title" class="image-picker-title">选择大狗图片</div>
        <div class="image-picker-hint">可以使用内置图片，也可以上传一张自己的图片。图片仅保存在当前浏览器中。</div>
        <div class="image-picker-options">
          <button id="default-image-option" class="image-picker-option" type="button">
            <img src="Image/dagou_close_mouth.png" alt="内置大狗预览" draggable="false" />
            <span>内置大狗</span>
          </button>
          <label id="upload-image-option" class="image-picker-option" tabindex="0">
            <span class="image-upload-icon" aria-hidden="true">↑</span>
            <span>上传我的图片</span>
            <input id="image-file" type="file" accept="image/*" hidden />
          </label>
        </div>
        <div id="image-picker-status" aria-live="polite"></div>
        <button id="clear-custom-image" type="button">移除自定义图片</button>
      </div>
    </div>

    <div id="overlay">
      <div class="title">大狗<em>Tap</em></div>
      <div class="sub">点 击 任 意 位 置 开 始</div>
    </div>
  </div>

  <script src="audio-data.js"></script>
  <script src="main.js"></script>
</body>
</html>
