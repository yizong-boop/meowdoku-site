<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Unity WebGL Player | Jigsolitaire Master</title>
    <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #151515; }
      #unity-container {
        position: fixed;
        left: 50%; top: 50%;
        width: min(100vw, calc(100vh * 9 / 20));
        height: min(100vh, calc(100vw * 20 / 9));
        transform: translate(-50%, -50%);
        background: #231F20;
      }
      #unity-canvas { display: block; width: 100%; height: 100%; background: #231F20; }
      #unity-loading-bar { position: absolute; left: 50%; top: 50%; width: 70%; transform: translate(-50%, -50%); }
      #unity-progress-bar-empty { width: 100%; height: 8px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.25); }
      #unity-progress-bar-full { width: 0%; height: 100%; background: #fff; }
      #unity-warning { position: absolute; left: 50%; top: 5%; max-width: 80%; transform: translateX(-50%); background: white; padding: 10px; display: none; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=360 height=800 tabindex="-1"></canvas>
      <div id="unity-loading-bar"><div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div></div>
      <div id="unity-warning"></div>
    </div>
    <script>
      const canvas = document.querySelector("#unity-canvas");
      const loadingBar = document.querySelector("#unity-loading-bar");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        const div = document.createElement("div");
        div.innerHTML = msg;
        div.style.cssText = type === "error" ? "background:#b00020;color:#fff;padding:10px;" : "padding:10px;";
        warningBanner.appendChild(div);
        warningBanner.style.display = "block";
        if (type !== "error") setTimeout(() => { div.remove(); warningBanner.style.display = warningBanner.children.length ? "block" : "none"; }, 5000);
      }

      const buildUrl = "Build";
      const config = {
        dataUrl: buildUrl + "/WebGL.data",
        frameworkUrl: buildUrl + "/WebGL.framework.js",
        codeUrl: buildUrl + "/WebGL.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "mintgames",
        productName: "Jigsolitaire Master",
        productVersion: "1.0.8",
        showBanner: unityShowBanner,
        autoSyncPersistentDataPath: true
      };

      loadingBar.style.display = "block";
      const script = document.createElement("script");
      script.src = buildUrl + "/WebGL.loader.js";
      script.onload = () => createUnityInstance(canvas, config, progress => {
        progressBarFull.style.width = (100 * progress) + "%";
      }).then(() => { loadingBar.style.display = "none"; }).catch(alert);
      document.body.appendChild(script);
    </script>
  </body>
</html>
